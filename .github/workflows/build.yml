name: Build Executables

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true
    
    - name: Build
      run: |
        go build -ldflags="-s -w" -o kickautodrops${{ runner.os == 'Windows' && '.exe' || '' }} .
    
    - name: Create release archive (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Compress-Archive -Path kickautodrops.exe,LICENSE,README.md -DestinationPath kickautodrops-windows.zip
    
    - name: Create release archive (Linux)
      if: runner.os == 'Linux'
      run: |
        tar -czf kickautodrops-linux.tar.gz kickautodrops LICENSE README.md
    
    - name: Upload Windows artifact
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: kickautodrops-windows
        path: kickautodrops-windows.zip
    
    - name: Upload Linux artifact
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: kickautodrops-linux
        path: kickautodrops-linux.tar.gz
    
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/kickautodrops-windows/kickautodrops-windows.zip
          artifacts/kickautodrops-linux/kickautodrops-linux.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
